<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘도 힘내세요!</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', sans-serif;
            gap: 24px;
        }
        h1 {
            font-size: 40px;
            font-weight: 800;
            color: #ffffff;
            text-align: center;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.15);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            letter-spacing: -1px;
            margin: 0;
            min-height: 1.2em;
        }
        h1:hover {
            transform: scale(1.05);
        }
        .action-btn {
            padding: 14px 32px;
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            background: linear-gradient(to right, #2575fc 0%, #6a11cb 100%);
            border: none;
            border-radius: 50px;
            box-shadow: 0 10px 20px rgba(37, 117, 252, 0.3);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: inherit;
        }
        .action-btn:hover {
            transform: translateY(-3px) scale(1.05);
            filter: brightness(1.1);
        }
        .action-btn:active {
            transform: translateY(0) scale(0.98);
        }
    </style>
</head>
<body>
    <h1 id="main-text">오늘도 힘내세요!</h1>
    <button id="next-btn" class="action-btn" onclick="nextMessage()">다음 문장 보기</button>

    <script>
        const messages = [
            { text: "오늘도 힘내세요!", gradient: "linear-gradient(to right, #2575fc 0%, #6a11cb 100%)", shadow: "rgba(37, 117, 252, 0.3)" },
            { text: "오늘도 해냈어요!", gradient: "linear-gradient(to right, #f9d423 0%, #ffdb01 100%)", shadow: "rgba(249, 212, 35, 0.4)" },
            { text: "조금씩 나아지고 있어요", gradient: "linear-gradient(to right, #f093fb 0%, #f5576c 100%)", shadow: "rgba(245, 87, 108, 0.4)" },
            { text: "이대로 계속 가봅시다.", gradient: "linear-gradient(to right, #00b09b 0%, #96c93d 100%)", shadow: "rgba(0, 176, 155, 0.4)" }
        ];
        
        let currentIndex = 0;

        function nextMessage() {
            currentIndex = (currentIndex + 1) % messages.length;
            const data = messages[currentIndex];
            const textEl = document.getElementById('main-text');
            const btnEl = document.getElementById('next-btn');

            // 텍스트 애니메이션 효과와 함께 변경
            textEl.style.opacity = '0';
            textEl.style.transform = 'translateY(10px)';
            
            setTimeout(() => {
                textEl.innerText = data.text;
                btnEl.style.background = data.gradient;
                btnEl.style.boxShadow = `0 10px 20px ${data.shadow}`;
                
                textEl.style.opacity = '1';
                textEl.style.transform = 'translateY(0)';
            }, 200);
        }
    </script>
</body>
</html>
